experiment:
  name: service_rate_control_v2_nnq_probe_10k
  output_dir: results

env:
  name: service_rate_control_v2
  gamma: 0.95
  lambda_arrival: 2.0
  mu_levels: [1.0, 3.0, 5.0]
  service_costs: [0.0, 0.2, 3.0]
  attack_cost: 0.5
  defend_cost: 0.2
  q_congestion: 0.2
  initial_state: 0
  uniformization_rate: 7.0
  low_threshold: 5
  high_threshold: 15

algorithm:
  name: nnq

nnq:
  hidden_size: 32
  learning_rate: 0.0005
  total_steps: 10000
  batch_size: 64
  replay_capacity: 10000
  target_update_interval: 250
  epsilon: 0.1
  seed: 0
  log_interval: 1000
  state_scale: 10.0
  state_feature_set: service_rate_augmented

bvi:
  max_queue_length: 20
  tolerance: 0.00001
  max_iterations: 600
  boundary_mode: clip

evaluation:
  num_episodes: 20
  horizon: 50
  seed: 200
  tail_threshold: 8
  boundary_state: 20

policy_grid:
  max_state: 20
  high_probability_threshold: 0.5
